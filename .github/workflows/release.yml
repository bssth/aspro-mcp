name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          # Intentionally NOT setting registry-url. setup-node would write a
          # ".npmrc" with "_authToken=${NODE_AUTH_TOKEN}" — when the token is
          # unset, npm treats this as "auth is already configured" and skips
          # the Trusted Publisher OIDC exchange, leading to a 404 on publish.

      - name: Replace toolcache npm with latest (Trusted Publisher needs >=11.5.1)
        # The bundled npm in setup-node's toolcache image is both (a) corrupted
        # so `npm install -g npm@latest` self-destructs, and (b) too old (10.x)
        # for the Trusted Publisher OIDC flow, which requires npm >= 11.5.1.
        # Easiest reliable fix: download the npm tarball and overwrite the
        # toolcache install directly. The PATH shim still points at the same
        # location, but now resolves to a fresh, working npm.
        run: |
          set -euo pipefail
          NPM_VERSION=$(curl -fsSL https://registry.npmjs.org/npm/latest | jq -r .version)
          echo "Installing npm@${NPM_VERSION}"
          NODE_PREFIX=$(node -p "require('path').dirname(require('path').dirname(process.execPath))")
          NPM_DIR="${NODE_PREFIX}/lib/node_modules/npm"
          curl -fsSL "https://registry.npmjs.org/npm/-/npm-${NPM_VERSION}.tgz" -o /tmp/npm.tgz
          rm -rf "${NPM_DIR}"
          mkdir -p "${NPM_DIR}"
          tar -xzf /tmp/npm.tgz -C "${NPM_DIR}" --strip-components=1
          echo "npm version: $(npm --version)"
          echo "npm path:    $(which npm)"
          echo "registry:    $(npm config get registry)"
          USERCONFIG=$(npm config get userconfig)
          echo "userconfig:  ${USERCONFIG}"
          [ -f "${USERCONFIG}" ] && cat "${USERCONFIG}" || echo "(no userconfig file)"

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build & smoke test
        run: |
          npm run build
          npm run smoke

      - name: Publish to npm (Trusted Publisher / OIDC)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

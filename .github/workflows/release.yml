name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          # Intentionally NOT setting registry-url. setup-node would write a
          # ".npmrc" with "_authToken=${NODE_AUTH_TOKEN}" — when the token is
          # unset, npm treats this as "auth is already configured" and skips
          # the Trusted Publisher OIDC exchange, leading to a 404 on publish.

      - name: Activate latest npm via corepack
        # The npm bundled with setup-node's toolcache image is corrupted
        # (missing promise-retry), so `npm install -g npm@latest` self-destructs
        # before it can replace itself. corepack downloads npm cleanly, bypassing
        # the broken global install entirely.
        run: |
          corepack enable
          corepack prepare npm@latest --activate
          echo "npm version: $(npm --version)"
          echo "registry:    $(npm config get registry)"
          echo "userconfig:  $(npm config get userconfig)"
          test -f "$(npm config get userconfig)" && cat "$(npm config get userconfig)" || echo "(no userconfig)"

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build & smoke test
        run: |
          npm run build
          npm run smoke

      - name: Publish to npm (Trusted Publisher / OIDC)
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
